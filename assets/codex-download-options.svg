<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Codex 下载入口示意图</title>
  <desc id="desc">展示 Install CLI、Download the app、Try IDE extension 三个入口，中间是 Download the app。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#67d8ff"/>
      <stop offset="0.48" stop-color="#8069ff"/>
      <stop offset="1" stop-color="#ff5f7b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="980" height="520" rx="22" fill="url(#bg)"/>
  <rect x="24" y="20" width="932" height="470" rx="18" fill="#fff" filter="url(#shadow)"/>
  <text x="490" y="66" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="30" font-weight="800" fill="#111827">Choose how to get started with Codex</text>
  <text x="490" y="98" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="14" fill="#64748b">先选入口：CLI、桌面 App、IDE 插件。小白优先选中间的 Download the app。</text>
  <g transform="translate(52 130)">
    <rect width="274" height="322" rx="14" fill="url(#card)" stroke="#d9e1ec"/>
    <rect x="22" y="28" width="230" height="142" rx="12" fill="#eaf2ff"/>
    <rect x="44" y="58" width="184" height="88" rx="8" fill="#ffffff" stroke="#c9d7ea"/>
    <text x="62" y="88" font-family="ui-monospace,Menlo,Consolas" font-size="14" fill="#334155">$ npm i -g @openai/codex</text>
    <text x="137" y="220" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="24" font-weight="800" fill="#111827">Install the CLI</text>
    <rect x="22" y="252" width="230" height="34" rx="17" fill="#050505"/>
    <text x="137" y="274" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas" font-size="12" fill="#ffffff">npm install command</text>
    <text x="137" y="306" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="13" fill="#64748b">适合开发者</text>
  </g>
  <g transform="translate(354 112)">
    <rect width="274" height="358" rx="14" fill="#ffffff" stroke="#665cff" stroke-width="3"/>
    <rect x="22" y="42" width="230" height="166" rx="14" fill="#eee9ff"/>
    <rect x="78" y="76" width="118" height="86" rx="14" fill="#ffffff" stroke="#d7d5ff"/>
    <circle cx="137" cy="119" r="18" fill="#101820"/>
    <path d="M129 120c0-8 6-14 14-14 7 0 13 6 13 14s-6 14-13 14c-3 0-6-1-8-3l-8 2 3-7c-1-2-1-4-1-6z" fill="#fff"/>
    <text x="137" y="260" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="24" font-weight="800" fill="#111827">Download the app</text>
    <rect x="22" y="294" width="230" height="36" rx="18" fill="#665cff"/>
    <text x="137" y="317" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="13" font-weight="700" fill="#ffffff">Download for macOS</text>
    <text x="137" y="346" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="13" fill="#64748b">小白优先选这个</text>
  </g>
  <g transform="translate(656 130)">
    <rect width="274" height="322" rx="14" fill="url(#card)" stroke="#d9e1ec"/>
    <rect x="22" y="28" width="230" height="142" rx="12" fill="#f2efff"/>
    <rect x="48" y="52" width="178" height="98" rx="10" fill="#ffffff" stroke="#d7d5ff"/>
    <rect x="66" y="74" width="130" height="12" rx="6" fill="#c8d3ff"/>
    <rect x="66" y="100" width="150" height="12" rx="6" fill="#f4a7b9"/>
    <rect x="66" y="126" width="108" height="12" rx="6" fill="#99e7cd"/>
    <text x="137" y="220" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="24" font-weight="800" fill="#111827">Try IDE extension</text>
    <rect x="22" y="252" width="230" height="34" rx="17" fill="#050505"/>
    <text x="137" y="274" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="12" fill="#ffffff">Try in your IDE</text>
    <text x="137" y="306" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="13" fill="#64748b">适合 VS Code / Cursor</text>
  </g>
</svg>
