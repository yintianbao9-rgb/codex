<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" role="img" aria-labelledby="title desc">
  <title id="title">Codex 桌面 App 总览示意图</title>
  <desc id="desc">展示 Codex 桌面 App 的项目区、任务区、上下文、权限、变更、终端、设置等模块。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f3fbf7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#0f766e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1100" height="660" rx="28" fill="url(#bg)"/>
  <text x="52" y="64" fill="#111827" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="800">Codex 桌面 App 先认这 8 个区域</text>
  <text x="52" y="96" fill="#5f6f7e" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="16">小白先会看界面，再开始让 Codex 读文件、改页面、跑验证。</text>

  <g filter="url(#shadow)">
    <rect x="64" y="128" width="972" height="456" rx="20" fill="#ffffff" stroke="#dbe2e8"/>
    <rect x="64" y="128" width="972" height="42" rx="20" fill="#111827"/>
    <circle cx="92" cy="149" r="6" fill="#fb7185"/>
    <circle cx="114" cy="149" r="6" fill="#fbbf24"/>
    <circle cx="136" cy="149" r="6" fill="#34d399"/>
    <text x="502" y="155" text-anchor="middle" fill="#e5e7eb" font-family="Arial" font-size="14">baoge-workspace - Codex</text>

    <rect x="84" y="188" width="210" height="356" rx="14" fill="#f8fafc" stroke="#dbe2e8"/>
    <text x="106" y="222" fill="#111827" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="800">1 项目 / 对话</text>
    <rect x="106" y="246" width="166" height="34" rx="9" fill="#ecfdf5" stroke="#99f6e4"/>
    <text x="124" y="268" fill="#0f766e" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="700">codex-practice</text>
    <rect x="106" y="292" width="166" height="34" rx="9" fill="#fff" stroke="#dbe2e8"/>
    <text x="124" y="314" fill="#475569" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13">baoge-site</text>
    <rect x="106" y="338" width="166" height="34" rx="9" fill="#fff" stroke="#dbe2e8"/>
    <text x="124" y="360" fill="#475569" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13">客户问题库</text>

    <rect x="320" y="188" width="430" height="248" rx="14" fill="#ffffff" stroke="#dbe2e8"/>
    <text x="344" y="222" fill="#111827" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="800">2 任务对话区</text>
    <rect x="344" y="250" width="360" height="58" rx="12" fill="#f1f5f9"/>
    <text x="366" y="274" fill="#475569" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13">请只读取当前练习文件夹，不要改文件。</text>
    <text x="366" y="294" fill="#475569" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13">告诉我这个文件夹适合做什么。</text>
    <rect x="344" y="326" width="314" height="70" rx="12" fill="#ecfdf5" stroke="#99f6e4"/>
    <text x="366" y="352" fill="#0f766e" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="700">Codex 回答：我会先读文件列表...</text>
    <text x="366" y="374" fill="#0f766e" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13">建议你先生成 README.md 草稿。</text>

    <rect x="320" y="462" width="430" height="82" rx="14" fill="#f8fafc" stroke="#dbe2e8"/>
    <text x="344" y="494" fill="#111827" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="800">3 输入框：目标 + 范围 + 限制 + 验收</text>
    <text x="344" y="520" fill="#64748b" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13">别只写“帮我看看”，要写清楚读哪里、改不改、输出什么。</text>

    <rect x="778" y="188" width="236" height="356" rx="14" fill="#ffffff" stroke="#dbe2e8"/>
    <text x="800" y="222" fill="#111827" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="800">右侧检查区</text>
    <rect x="800" y="248" width="190" height="44" rx="10" fill="#eef6ff" stroke="#bfdbfe"/>
    <text x="818" y="276" fill="#1f6feb" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="800">4 上下文文件</text>
    <rect x="800" y="306" width="190" height="44" rx="10" fill="#fff8e8" stroke="#fde68a"/>
    <text x="818" y="334" fill="#92400e" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="800">5 权限和审批</text>
    <rect x="800" y="364" width="190" height="44" rx="10" fill="#ecfdf5" stroke="#99f6e4"/>
    <text x="818" y="392" fill="#0f766e" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="800">6 文件变更</text>
    <rect x="800" y="422" width="190" height="44" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="818" y="450" fill="#334155" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="800">7 终端验证</text>
    <rect x="800" y="480" width="190" height="44" rx="10" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="818" y="508" fill="#6d28d9" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="800">8 设置 / 个性化</text>
  </g>

  <path d="M276 263 C306 263 306 263 320 263" stroke="#0f766e" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M750 356 C764 356 764 356 778 356" stroke="#0f766e" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
</svg>
